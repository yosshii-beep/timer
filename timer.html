<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>タイマー</title>
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      color: #fff;
    }

    .card {
      background: #111;
      border-radius: 20px;
      padding: 48px 56px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      min-width: 340px;
    }

    @media (max-width: 480px) {
      body {
        align-items: stretch;
      }
      .card {
        border-radius: 0;
        min-width: 0;
        width: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        padding: 48px 32px;
        justify-content: center;
        box-shadow: none;
      }
    }

    h1 {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
    }

    .input-area {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .tabs {
      display: flex;
      gap: 4px;
      background: #1a1a1a;
      border-radius: 12px;
      padding: 4px;
      width: 100%;
    }

    .tab {
      flex: 1;
      padding: 10px 0;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #666;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      letter-spacing: 0.06em;
    }
    .tab.active {
      background: #333;
      color: #fff;
    }

    .select-wrap {
      position: relative;
      width: 100%;
    }

    select {
      width: 100%;
      padding: 16px 44px 16px 20px;
      border: 2px solid #2a2a2a;
      border-radius: 12px;
      background: #1a1a1a;
      color: #fff;
      font-size: 16px;
      font-weight: 300;
      font-variant-numeric: tabular-nums;
      cursor: pointer;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }
    select option {
      background: #1a1a1a;
      color: #fff;
    }

    .select-arrow {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #555;
      pointer-events: none;
      font-size: 18px;
    }

    .display {
      display: none;
      font-size: 64px;
      font-weight: 200;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
      color: #fff;
      transition: color 0.3s;
    }
    .display.warning { color: #e74c3c; }

    .buttons {
      display: flex;
      gap: 12px;
    }

    button {
      padding: 12px 28px;
      border: none;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.04em;
    }
    button:active { transform: scale(0.97); }

    .btn-pause {
      background: #fff;
      color: #000;
    }
    .btn-pause:hover { background: #ddd; }
    .btn-pause:disabled { opacity: 0.4; cursor: default; transform: none; }

    .btn-reset {
      background: #222;
      color: #aaa;
    }
    .btn-reset:hover { background: #333; }

    .done-msg {
      display: none;
      font-size: 18px;
      font-weight: 400;
      color: #888;
      letter-spacing: 0.04em;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
<div class="card">
  <h1>Timer</h1>

  <div class="input-area" id="inputArea">
    <div class="tabs">
      <button class="tab active" onclick="switchTab(this,'sec')">秒</button>
      <button class="tab" onclick="switchTab(this,'min')">分</button>
      <button class="tab" onclick="switchTab(this,'5min')">5分</button>
    </div>
    <div class="select-wrap">
      <select id="timeSelect" onchange="onSelectChange()">
        <option value="" disabled selected>選択してください</option>
      </select>
      <span class="select-arrow">▾</span>
    </div>
  </div>

  <div class="display" id="display">0:00</div>
  <div class="done-msg" id="doneMsg">時間になりました！</div>

  <div class="buttons" id="btnArea" style="display:none">
    <button class="btn-pause" id="pauseBtn" onclick="handlePause()">一時停止</button>
    <button class="btn-reset" onclick="handleReset()">リセット</button>
  </div>
</div>

<script>
  var audioCtx = null;
  var audioUnlocked = false;
  var alarmNodes = [];
  var alarmEndTimeout = null;


  function unlockAudio() {
    if (audioUnlocked) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      var buf = audioCtx.createBuffer(1, 1, 22050);
      var src = audioCtx.createBufferSource();
      src.buffer = buf;
      src.connect(audioCtx.destination);
      src.start(0);
      if (audioCtx.state === 'suspended') {
        audioCtx.resume().then(function() { audioUnlocked = true; });
      } else {
        audioUnlocked = true;
      }
    } catch(e) {}
  }

  var remaining = 0;
  var initialTime = 0;
  var intervalId = null;
  var running = false;

  var display   = document.getElementById('display');
  var doneMsg   = document.getElementById('doneMsg');
  var btnArea   = document.getElementById('btnArea');
  var pauseBtn  = document.getElementById('pauseBtn');
  var inputArea = document.getElementById('inputArea');

  function formatTime(sec) {
    var h = Math.floor(sec / 3600);
    var m = Math.floor((sec % 3600) / 60);
    var s = sec % 60;
    var ss = String(s).padStart(2, '0');
    if (h > 0) return h + ':' + String(m).padStart(2, '0') + ':' + ss;
    return m + ':' + ss;
  }

  function switchTab(el, tab) {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    el.classList.add('active');
    populateSelect(tab);
  }

  function populateSelect(tab) {
    var select = document.getElementById('timeSelect');
    select.innerHTML = '<option value="" disabled selected>選択してください</option>';
    var seconds = [];
    if (tab === 'sec') {
      for (var s = 10; s <= 50; s += 10) seconds.push(s);
    } else if (tab === 'min') {
      for (var m = 1; m <= 60; m++) seconds.push(m * 60);
    } else {
      for (var f = 5; f <= 60; f += 5) seconds.push(f * 60);
    }
    seconds.forEach(function(s) {
      var opt = document.createElement('option');
      opt.value = s;
      opt.textContent = formatTime(s);
      select.appendChild(opt);
    });
  }

  function onSelectChange() {
    unlockAudio();
    var select = document.getElementById('timeSelect');
    select.style.fontSize = select.value === '' ? '16px' : '32px';
    var val = parseInt(select.value);
    if (!val) return;
    stopAlarm();
    clearInterval(intervalId);
    remaining = val;
    initialTime = val;
    startTimer();
  }

  function startTimer() {
    clearInterval(intervalId);
    running = true;
    inputArea.style.display = 'none';
    doneMsg.style.display   = 'none';
    display.style.display   = 'block';
    display.classList.remove('warning');
    btnArea.style.display   = 'flex';
    pauseBtn.textContent    = '一時停止';
    pauseBtn.disabled       = false;
    updateDisplay();

    intervalId = setInterval(function() {
      keepAudioAlive();
      remaining--;
      updateDisplay();
      if (remaining <= 0) finish();
    }, 1000);
  }

  // iOSがAudioContextを自動停止しないよう毎秒無音バッファを再生する
  function keepAudioAlive() {
    if (!audioCtx || audioCtx.state !== 'running') return;
    var buf = audioCtx.createBuffer(1, 1, audioCtx.sampleRate);
    var src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.connect(audioCtx.destination);
    src.start();
  }

  function handlePause() {
    if (running) {
      clearInterval(intervalId);
      running = false;
      pauseBtn.textContent = '再開';
    } else {
      running = true;
      pauseBtn.textContent = '一時停止';
      intervalId = setInterval(function() {
        keepAudioAlive();
        remaining--;
        updateDisplay();
        if (remaining <= 0) finish();
      }, 1000);
    }
  }

  function finish() {
    clearInterval(intervalId);
    running = false;
    playAlarm(10, null);
    doneMsg.style.display = 'block';
    setTimeout(function() { doneMsg.style.display = 'none'; }, 10000);
    remaining = initialTime;
    startTimer();
  }

  function handleReset() {
    clearInterval(intervalId);
    stopAlarm();
    running = false;
    remaining = 0;
    initialTime = 0;
    display.style.display   = 'none';
    doneMsg.style.display   = 'none';
    btnArea.style.display   = 'none';
    inputArea.style.display = 'flex';
    var select = document.getElementById('timeSelect');
    select.selectedIndex = 0;
    select.style.fontSize = '16px';
  }

  function updateDisplay() {
    display.textContent = formatTime(remaining);
    display.classList.toggle('warning', remaining <= 10 && remaining > 0);
  }

  // iPhoneのRadarアラームに近い昇順4音パターンを10秒間繰り返す
  function playAlarm(duration, onEnd) {
    if (!audioCtx) {
      if (onEnd) setTimeout(onEnd, duration * 1000);
      return;
    }
    stopAlarm();

    var doPlay = function() {
      var now = audioCtx.currentTime;
      var freqs = [659, 784, 988, 1175]; // E5, G5, B5, D6
      var noteLen = 0.1;
      var noteGap = 0.03;
      var patternLen = (noteLen + noteGap) * freqs.length + 0.35;

      for (var t = 0; t < duration; t += patternLen) {
        freqs.forEach(function(freq, i) {
          var noteStart = now + t + i * (noteLen + noteGap);
          if (noteStart >= now + duration) return;
          var osc = audioCtx.createOscillator();
          var gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.type = 'triangle';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0, noteStart);
          gain.gain.linearRampToValueAtTime(0.4, noteStart + 0.01);
          gain.gain.setValueAtTime(0.4, noteStart + noteLen - 0.02);
          gain.gain.linearRampToValueAtTime(0, noteStart + noteLen);
          osc.start(noteStart);
          osc.stop(noteStart + noteLen);
          alarmNodes.push(osc);
        });
      }

      alarmEndTimeout = setTimeout(function() {
        stopAlarm();
        if (onEnd) onEnd();
      }, duration * 1000);
    };

    if (audioCtx.state === 'suspended') {
      audioCtx.resume().then(doPlay);
    } else {
      doPlay();
    }
  }

  function stopAlarm() {
    if (alarmEndTimeout) { clearTimeout(alarmEndTimeout); alarmEndTimeout = null; }
    alarmNodes.forEach(function(n) { try { n.stop(); n.disconnect(); } catch(e) {} });
    alarmNodes = [];
  }

  populateSelect('sec');
  document.addEventListener('touchstart', unlockAudio, { once: true });
  document.addEventListener('click', unlockAudio, { once: true });
</script>
</body>
</html>
