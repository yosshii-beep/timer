<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>タイマー</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1a1a1a;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 56px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      min-width: 340px;
    }

    h1 {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
    }

    .time-inputs {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .time-inputs input {
      width: 64px;
      text-align: center;
      font-size: 36px;
      font-weight: 300;
      border: none;
      border-bottom: 2px solid #e0e0e0;
      outline: none;
      background: transparent;
      color: #1a1a1a;
      padding: 4px 0;
      transition: border-color 0.2s;
    }
    .time-inputs input:focus {
      border-bottom-color: #1a1a1a;
    }
    .time-inputs .sep {
      font-size: 32px;
      font-weight: 300;
      color: #ccc;
      margin-bottom: 4px;
    }

    .input-labels {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 6px;
    }
    .input-labels span {
      width: 64px;
      text-align: center;
      font-size: 11px;
      color: #bbb;
      letter-spacing: 0.06em;
    }
    .input-labels .spacer { width: 24px; }

    .display {
      display: none;
      font-size: 64px;
      font-weight: 200;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
      color: #1a1a1a;
      transition: color 0.3s;
    }
    .display.warning { color: #e74c3c; }

    .buttons {
      display: flex;
      gap: 12px;
    }

    button {
      padding: 12px 28px;
      border: none;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.04em;
    }
    button:active { transform: scale(0.97); }

    .btn-start {
      background: #1a1a1a;
      color: #fff;
    }
    .btn-start:hover { background: #333; }

    .btn-reset {
      background: #f0f0f0;
      color: #555;
    }
    .btn-reset:hover { background: #e0e0e0; }

    .done-msg {
      display: none;
      font-size: 18px;
      font-weight: 400;
      color: #888;
      letter-spacing: 0.04em;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
<div class="card">
  <h1>Timer</h1>

  <div id="inputArea">
    <div class="time-inputs">
      <input type="number" id="inputH" min="0" max="23" value="0" />
      <span class="sep">:</span>
      <input type="number" id="inputM" min="0" max="59" value="5" />
      <span class="sep">:</span>
      <input type="number" id="inputS" min="0" max="59" value="0" />
    </div>
    <div class="input-labels">
      <span>時間</span>
      <span class="spacer"></span>
      <span>分</span>
      <span class="spacer"></span>
      <span>秒</span>
    </div>
  </div>

  <div class="display" id="display">00:05:00</div>
  <div class="done-msg" id="doneMsg">時間になりました！</div>

  <div class="buttons">
    <button class="btn-start" id="mainBtn" onclick="handleMain()">開始</button>
    <button class="btn-reset" id="resetBtn" onclick="handleReset()" style="display:none">リセット</button>
  </div>
</div>

<script>
  let remaining = 0;
  let intervalId = null;
  let running = false;
  let finished = false;

  // AudioContext をユーザー操作時に初期化（ブラウザの自動再生制限を回避）
  var audioCtx = null;

  function getAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    // suspended 状態の場合は resume する
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    return audioCtx;
  }

  const inputArea = document.getElementById('inputArea');
  const display   = document.getElementById('display');
  const doneMsg   = document.getElementById('doneMsg');
  const mainBtn   = document.getElementById('mainBtn');
  const resetBtn  = document.getElementById('resetBtn');

  function pad(n) { return String(n).padStart(2, '0'); }

  function formatTime(sec) {
    var h = Math.floor(sec / 3600);
    var m = Math.floor((sec % 3600) / 60);
    var s = sec % 60;
    return pad(h) + ':' + pad(m) + ':' + pad(s);
  }

  function handleMain() {
    // ボタンクリック時に AudioContext を初期化（ユーザー操作のタイミングで行う）
    getAudioCtx();

    if (finished) return;
    if (!running) {
      if (remaining === 0) {
        var h = parseInt(document.getElementById('inputH').value) || 0;
        var m = parseInt(document.getElementById('inputM').value) || 0;
        var s = parseInt(document.getElementById('inputS').value) || 0;
        remaining = h * 3600 + m * 60 + s;
        if (remaining <= 0) { alert('時間を入力してください'); return; }
      }
      startTimer();
    } else {
      pauseTimer();
    }
  }

  function startTimer() {
    running = true;
    mainBtn.textContent = '一時停止';
    inputArea.style.display = 'none';
    doneMsg.style.display   = 'none';
    display.style.display   = 'block';
    display.classList.remove('warning');
    resetBtn.style.display  = 'inline-block';
    updateDisplay();

    intervalId = setInterval(function() {
      remaining--;
      updateDisplay();
      if (remaining <= 0) finish();
    }, 1000);
  }

  function pauseTimer() {
    clearInterval(intervalId);
    running = false;
    mainBtn.textContent = '再開';
  }

  function finish() {
    clearInterval(intervalId);
    running = false;
    finished = true;
    display.style.display = 'none';
    doneMsg.style.display = 'block';
    mainBtn.disabled = true;
    mainBtn.style.opacity = '0.4';
    playBeep();
  }

  function handleReset() {
    clearInterval(intervalId);
    running = false;
    finished = false;
    remaining = 0;
    display.style.display   = 'none';
    doneMsg.style.display   = 'none';
    inputArea.style.display = 'block';
    resetBtn.style.display  = 'none';
    mainBtn.textContent     = '開始';
    mainBtn.disabled        = false;
    mainBtn.style.opacity   = '1';
  }

  function updateDisplay() {
    display.textContent = formatTime(remaining);
    if (remaining <= 10 && remaining > 0) {
      display.classList.add('warning');
    } else {
      display.classList.remove('warning');
    }
  }

  function playBeep() {
    try {
      var ctx = getAudioCtx();
      [0, 0.35, 0.7].forEach(function(delay) {
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.4, ctx.currentTime + delay);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.3);
        osc.start(ctx.currentTime + delay);
        osc.stop(ctx.currentTime + delay + 0.35);
      });
    } catch(e) {
      console.warn('beep error:', e);
    }
  }

  ['inputH','inputM','inputS'].forEach(function(id) {
    var el = document.getElementById(id);
    el.addEventListener('change', function() {
      var v = parseInt(el.value) || 0;
      var max = id === 'inputH' ? 23 : 59;
      el.value = Math.min(Math.max(v, 0), max);
    });
  });
</script>
</body>
</html>
